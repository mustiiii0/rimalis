name: i18n Quality Gate

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  i18n-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Run link check
        run: npm run check:links

      - name: Start backend
        run: |
          npm run start >/tmp/rimalis_backend.log 2>&1 &
          echo $! >/tmp/rimalis_backend.pid

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time"
          cat /tmp/rimalis_backend.log || true
          exit 1

      - name: Run i18n smoke
        run: npm run smoke:i18n

      - name: Run i18n live smoke
        run: npm run smoke:i18n:live

      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/rimalis_backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/rimalis_backend.pid ]; then
            kill "$(cat /tmp/rimalis_backend.pid)" >/dev/null 2>&1 || true
          fi
