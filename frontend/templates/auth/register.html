<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimalis Group | Registrera dig</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Våra egna CSS-filer -->
    <link rel="stylesheet" href="/static/css/public/style.css">
    <link rel="stylesheet" href="/static/css/public/components.css">
    <link rel="stylesheet" href="/static/css/public/responsive.css">
</head>

<body class="min-h-screen">
    <section class="hero-bg relative min-h-screen flex items-center justify-center px-6 lg:px-12">
        <div class="absolute inset-0 bg-black/45"></div>
        <a href="../public/home.html" class="absolute top-8 left-8 z-20 text-white/80 hover:text-white transition-colors text-sm font-bold uppercase tracking-widest">
            <i class="fas fa-arrow-left mr-2"></i>Tillbaka
        </a>

        <div class="modal-content modal-content--register relative z-10">
            <div class="text-center mb-8">
                <img src="/static/image/Rimalis-Group.png" alt="Rimalis Group" class="brand-logo brand-logo--auth mx-auto mb-4">
                <h1 class="text-2xl font-black tracking-tighter">Skapa konto</h1>
                <p class="text-white/40 text-sm mt-2">Bli medlem och få tillgång till exklusiva objekt</p>
            </div>

            <form class="space-y-4" id="registerForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" placeholder="Förnamn" class="input-field" id="firstName" required>
                    <input type="text" placeholder="Efternamn" class="input-field" id="lastName" required>
                </div>

                <input type="email" placeholder="E-post" class="input-field" id="registerEmail" required>
                <input type="tel" placeholder="Telefon" class="input-field" id="phone">
                <input type="password" placeholder="Lösenord" class="input-field" id="registerPassword" required>
                <input type="password" placeholder="Bekräfta lösenord" class="input-field" id="confirmPassword" required>

                <div class="flex items-start gap-3">
                    <input type="checkbox" class="accent-[#e2ff31] mt-1" id="terms" checked required>
                    <label for="terms" class="text-white/40 text-sm" id="registerTermsText">
                        Jag godkänner <a href="../legal/terms.html" class="text-[#e2ff31] hover:underline">användarvillkoren</a>
                        och <a href="../legal/privacy.html" class="text-[#e2ff31] hover:underline">integritetspolicyn</a>
                    </label>
                </div>

                <button type="submit" class="btn-primary w-full justify-center mt-6">
                    Skapa konto
                </button>

                <p class="text-center text-white/40 text-sm mt-6">
                    <span id="registerHasAccountText">Har du redan ett konto?</span>
                    <a href="login.html" class="text-[#e2ff31] hover:underline">Logga in</a>
                </p>

                <p id="registerFeedback" class="text-center text-sm text-white/50 mt-2"></p>
            </form>
        </div>
    </section>

    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/auth/auth.js"></script>
    <script src="/static/js/public/i18n.js"></script>
    

</body>

</html>
