<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimalis Group | Återställ lösenord</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link rel="stylesheet" href="/static/css/public/style.css">
    <link rel="stylesheet" href="/static/css/public/components.css">
    <link rel="stylesheet" href="/static/css/public/responsive.css">
</head>

<body class="min-h-screen">
    <section class="hero-bg relative min-h-screen flex items-center justify-center px-6 lg:px-12">
        <div class="absolute inset-0 bg-black/45"></div>
        <a href="login.html"
            class="absolute top-8 left-8 z-20 text-white/80 hover:text-white transition-colors text-sm font-bold uppercase tracking-widest">
            <i class="fas fa-arrow-left mr-2"></i>Tillbaka
        </a>

        <div class="modal-content relative z-10">
            <div class="text-center mb-8">
                <img src="/static/image/Rimalis-Group.png" alt="Rimalis Group" class="brand-logo brand-logo--auth mx-auto mb-4">
                <h1 class="text-2xl font-black tracking-tighter">Återställ lösenord</h1>
                <p class="text-white/40 text-sm mt-2">
                    Välj ett nytt lösenord för ditt konto.
                </p>
            </div>

            <form class="space-y-4" id="resetForm">
                <input type="password" placeholder="Nytt lösenord" class="input-field" id="newPassword" required>
                <input type="password" placeholder="Bekräfta lösenord" class="input-field" id="confirmPassword" required>

                <button type="submit" class="btn-primary w-full justify-center mt-6">
                    Spara nytt lösenord
                </button>

                <p class="text-center text-white/40 text-sm mt-6">
                    <a href="login.html" class="text-[#e2ff31] hover:underline">
                        <i class="fas fa-arrow-left mr-2"></i>Tillbaka till inloggning
                    </a>
                </p>
            </form>
        </div>
    </section>

    
    <script src="/static/js/auth/auth.js"></script>
    <script src="/static/js/public/i18n.js"></script>
</body>

</html>
