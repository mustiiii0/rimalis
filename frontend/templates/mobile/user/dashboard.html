<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title data-i18n="title_user_dashboard">Rimalis Group | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/static/css/mobile/mobile.css">
  <link rel="stylesheet" href="/static/css/mobile/user.css">
  <link rel="stylesheet" href="/static/css/mobile/user/dashboard.css">
</head>
<body class="mobile-user-dashboard-page">
  <div id="nav-container"></div>

  <div class="mobile-dashboard-shell">
    <header class="mobile-dashboard-topbar">
      <div class="mobile-dashboard-topbar__left">
        <h1 class="mobile-dashboard-topbar__title" data-i18n="nav_dashboard">Dashboard</h1>
      </div>
    </header>

    <main class="mobile-dashboard-content">
      <section class="mobile-dashboard-welcome">
        <div class="mobile-dashboard-welcome__meta">
          <span class="mobile-dashboard-pill" data-i18n="user_dashboard_today_overview">Översikt idag</span>
          <span class="mobile-dashboard-userline">
            <strong id="userSidebarName" data-i18n="common_loading">Laddar...</strong>
            <small id="userSidebarEmail" data-i18n="common_loading">Laddar...</small>
          </span>
        </div>
        <h2 class="mobile-dashboard-welcome__title" id="dashboardWelcome">
          <span id="dashboardWelcomePrefix" data-i18n="user_dashboard_welcome_prefix">Välkommen tillbaka,</span>
          <span id="dashboardWelcomeName">...</span>
        </h2>
        <p class="mobile-dashboard-welcome__text" id="dashboardIntroText" data-i18n="user_dashboard_intro_text">Här är en översikt över ditt konto och dina aktiviteter.</p>
      </section>

      <section class="mobile-dashboard-actions-card">
        <div class="mobile-dashboard-section-head">
          <h2 data-i18n="user_dashboard_quick_actions">Snabbåtgärder</h2>
          <a href="my_listings.html" data-i18n="show_all">Visa alla</a>
        </div>
        <div class="mobile-dashboard-actions-grid">
          <a href="create_listing/step1_listing_info.html">
            <span><i class="fas fa-plus"></i></span>
            <strong data-i18n="user_dashboard_new_listing">Ny annons</strong>
          </a>
          <a href="my_listings.html">
            <span><i class="fas fa-list"></i></span>
            <strong data-i18n="user_dashboard_listings_short">Annonser</strong>
          </a>
          <a href="messages.html">
            <span><i class="fas fa-comment-dots"></i></span>
            <strong data-i18n="user_messages_title">Meddelanden</strong>
          </a>
          <a href="bookings.html">
            <span><i class="fas fa-calendar-check"></i></span>
            <strong data-i18n="user_dashboard_viewings_short">Visningar</strong>
          </a>
        </div>
      </section>

      <section class="mobile-dashboard-activity-card">
        <div class="mobile-dashboard-section-head">
          <h2 id="recentActivityTitle" data-i18n="user_dashboard_recent_activity_title">Senaste aktivitet</h2>
          <a href="messages.html" data-i18n="user_dashboard_cta_view_all">Se alla</a>
        </div>
        <div id="recentActivityFeed" class="mobile-dashboard-activity-list"></div>
      </section>

      <section class="mobile-dashboard-properties-card">
        <div class="mobile-dashboard-section-head">
          <h2 data-i18n="user_dashboard_my_listings_title">Mina annonser</h2>
          <a href="my_listings.html" data-i18n="user_dashboard_cta_manage">Hantera</a>
        </div>
        <div id="recentPropertiesGrid" class="mobile-dashboard-properties-grid"></div>
      </section>

      <nav class="bottom-nav">
        <a href="../public/home.html" class="nav-item"><i class="fas fa-home"></i><span data-i18n="nav_home">Hem</span></a>
        <a href="../public/properties.html" class="nav-item"><i class="fas fa-search"></i><span data-i18n="nav_search">Sök</span></a>
        <a href="dashboard.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span data-i18n="nav_dashboard">Dashboard</span></a>
        <a href="favorites.html" class="nav-item"><i class="far fa-heart"></i><span data-i18n="nav_saved">Sparade</span></a>
        <a href="messages.html" class="nav-item"><i class="far fa-comment"></i><span data-i18n="nav_chat">Chat</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span data-i18n="nav_profile">Profil</span></a>
      </nav>
    </main>
  </div>

  <script src="/static/js/mobile/mobile.js"></script>
  <script src="/static/js/shared/api.js"></script>
  <script src="/static/js/shared/page-guards.js"></script>
  <script src="/static/js/shared/menu-config.js"></script>
  <script src="/static/js/user/user-menu.js"></script>
  <script src="/static/js/public/navigation.js"></script>
  <script src="/static/js/public/i18n.js"></script>
  <script src="/static/js/public/favorites.js"></script>
  <script src="/static/js/user/dashboard.js"></script>
  <script src="/static/js/mobile/user/dashboard.js"></script>
</body>
</html>
