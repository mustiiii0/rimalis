<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title data-i18n="title_user_my_listings">Rimalis Group | Mina annonser</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/static/css/mobile/mobile.css">
  <link rel="stylesheet" href="/static/css/mobile/user.css">
  <link rel="stylesheet" href="/static/css/mobile/user/my-listings.css">
</head>
<body class="mobile-user-my-listings-page">
  <div id="nav-container"></div>

  <div class="mobile-my-listings-shell">
    <div class="mobile-my-listings-statusbar">
      <span>9:41</span>
      <span><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></span>
    </div>

    <header class="mobile-my-listings-topbar">
      <a href="dashboard.html" class="mobile-my-listings-icon-btn" aria-label="Tillbaka" data-i18n-aria-label="auth_back">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h1 class="mobile-my-listings-topbar__title" data-i18n="user_profile_my_listings_title">Mina annonser</h1>
      <span class="mobile-my-listings-topbar__spacer" aria-hidden="true"></span>
    </header>

    <main class="mobile-my-listings-content">
      <section class="mobile-my-listings-hero">
        <div class="mobile-my-listings-hero__meta">
          <span class="mobile-my-listings-pill" data-i18n="user_publish_smarter">Publicera smartare</span>
          <span class="mobile-my-listings-identity">
            <strong id="userSidebarName">Laddar...</strong>
            <small id="userSidebarEmail">laddar...</small>
          </span>
        </div>
        <h2 id="userMyListingsTitle">Mina <span>annonser</span></h2>
        <p id="userMyListingsDesc" data-i18n="user_manage_published_listings">Hantera dina publicerade objekt</p>
        <a href="create_listing/step1_listing_info.html" class="mobile-my-listings-create-btn" id="userMyListingsCreateBtn">
          <i class="fas fa-plus-circle"></i>
          <span data-i18n="user_create_new_listing">Skapa ny annons</span>
        </a>
      </section>

      <section class="mobile-my-listings-summary">
        <article>
          <strong id="mobileListingsPublishedCount">0</strong>
          <span data-i18n="user_tab_active">Aktiva</span>
        </article>
        <article>
          <strong id="mobileListingsPendingCount">0</strong>
          <span data-i18n="user_tab_pending">Pågående</span>
        </article>
        <article>
          <strong id="mobileListingsSoldCount">0</strong>
          <span data-i18n="user_tab_sold">Sålda</span>
        </article>
      </section>

      <section class="mobile-my-listings-tabs-card">
        <div class="mobile-my-listings-tabs" id="myListingsTabs"></div>
      </section>

      <section class="mobile-my-listings-list-card">
        <div id="myListingsContainer" class="mobile-my-listings-list"></div>
      </section>

      <nav class="bottom-nav">
        <a href="../public/home.html" class="nav-item"><i class="fas fa-home"></i><span data-i18n="nav_home">Hem</span></a>
        <a href="../public/properties.html" class="nav-item"><i class="fas fa-search"></i><span data-i18n="nav_search">Sök</span></a>
        <a href="dashboard.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span data-i18n="nav_dashboard">Dashboard</span></a>
        <a href="favorites.html" class="nav-item"><i class="far fa-heart"></i><span data-i18n="nav_saved">Sparade</span></a>
        <a href="messages.html" class="nav-item"><i class="far fa-comment"></i><span data-i18n="nav_chat">Chat</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span data-i18n="nav_profile">Profil</span></a>
      </nav>
    </main>
  </div>

  <script src="/static/js/mobile/mobile.js"></script>
  <script src="/static/js/shared/api.js"></script>
  <script src="/static/js/shared/page-guards.js"></script>
  <script src="/static/js/shared/menu-config.js"></script>
  <script src="/static/js/user/user-menu.js"></script>
  <script src="/static/js/public/navigation.js"></script>
  <script src="/static/js/public/i18n.js"></script>
  <script src="/static/js/public/favorites.js"></script>
  <script src="/static/js/mobile/user/my-listings.js"></script>
</body>
</html>
