<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title data-i18n="title_login">Logga in | Rimalis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/mobile/mobile.css">
    <link rel="stylesheet" href="/static/css/mobile/auth.css">
</head>
<body class="mobile-auth-page mobile-auth-login-page">
    <div class="mobile-shell mobile-auth-app">
        <div class="mobile-auth-content">
            <div class="auth-return">
                <button type="button" class="auth-return__btn" data-history-back>
                    <svg class="auth-return__icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M15 5L8 12L15 19" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
            </div>

            <div class="mobile-auth-logo-section">
                <div class="mobile-auth-logo-icon">
                    <img src="/static/image/app-logo.png" alt="Rimalis app logo" class="mobile-auth-logo-image">
                </div>
                <div class="mobile-auth-logo-text">Rimalis</div>
                <div class="mobile-auth-logo-slogan" data-i18n="home_mobile_hero_desc">Hitta ditt drömhem</div>
            </div>

            <div class="mobile-auth-login-container" id="loginModal">
                <div class="mobile-auth-tab-container">
                    <a href="login.html" class="mobile-auth-tab active" data-i18n="login_btn">Logga in</a>
                    <a href="register.html" class="mobile-auth-tab" data-i18n="register_link">Registrera</a>
                </div>

                <p id="loginFeedback" class="mobile-auth-feedback"></p>

                <form id="loginForm">
                    <div class="mobile-auth-form-section">
                        <div class="mobile-auth-input-group">
                            <label class="mobile-auth-input-label" for="loginEmail" data-i18n="field_email">E-post</label>
                            <div class="mobile-auth-input-wrapper">
                                <i class="fas fa-envelope mobile-auth-input-icon"></i>
                                <input type="email" class="input-field mobile-auth-input-field" placeholder="din@email.se" data-i18n-placeholder="newsletter_email_placeholder" id="loginEmail" required autocomplete="email">
                            </div>
                        </div>

                        <div class="mobile-auth-input-group">
                            <label class="mobile-auth-input-label" for="loginPassword" data-i18n="field_password">Lösenord</label>
                            <div class="mobile-auth-input-wrapper">
                                <i class="fas fa-lock mobile-auth-input-icon"></i>
                                <input type="password" class="input-field mobile-auth-input-field" placeholder="••••••••" id="loginPassword" required autocomplete="current-password">
                                <button type="button" class="mobile-auth-toggle-password" id="mobileAuthPasswordToggle" aria-label="Visa lösenord" data-i18n-aria-label="user_profile_show_password">
                                    <i class="fas fa-eye" id="mobileAuthPasswordIcon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mobile-auth-row-flex">
                            <label class="mobile-auth-remember-me">
                                <input type="checkbox" checked>
                                <span data-i18n="auth_remember_me">Kom ihåg mig</span>
                            </label>
                            <a href="forgot_password.html" class="mobile-auth-forgot-link" data-i18n="forgot_password">Glömt lösenord?</a>
                        </div>

                        <button type="submit" class="mobile-auth-login-btn" id="loginBtn">
                            <span class="btn-text" data-i18n="login_btn">Logga in</span>
                            <span class="mobile-auth-spinner"></span>
                        </button>
                    </div>
                </form>

                <div class="mobile-auth-divider">
                    <div class="mobile-auth-divider-line"></div>
                    <div class="mobile-auth-divider-text" data-i18n="auth_continue_with">eller fortsätt med</div>
                    <div class="mobile-auth-divider-line"></div>
                </div>

                <div class="mobile-auth-social-grid">
                    <button type="button" class="mobile-auth-social-btn google" aria-label="Logga in med Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button type="button" class="mobile-auth-social-btn facebook" aria-label="Logga in med Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                    <button type="button" class="mobile-auth-social-btn apple" aria-label="Logga in med Apple">
                        <i class="fab fa-apple"></i>
                    </button>
                </div>

                <div class="mobile-auth-register-section">
                    <span data-i18n="auth_no_account">Har du inget konto?</span>
                    <a href="register.html" class="mobile-auth-register-link" data-i18n="register_link">Registrera dig</a>
                </div>

                <div class="mobile-auth-legal-note" data-i18n="auth_terms_html" data-i18n-html>
                    Genom att fortsätta godkänner du våra
                    <a href="../legal/terms.html">villkor</a>
                    och vår
                    <a href="../legal/privacy.html">integritetspolicy</a>.
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/mobile/mobile.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/auth/auth.js"></script>
    <script src="/static/js/public/i18n.js"></script>
    <script src="/static/js/mobile/auth/login.js"></script>
</body>
</html>
