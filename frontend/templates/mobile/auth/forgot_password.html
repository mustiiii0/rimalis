<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rimalis Group | Glömt lösenord</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/mobile/mobile.css">
    <link rel="stylesheet" href="/static/css/mobile/auth.css">

</head>

<body class="mobile-auth-page mobile-auth-forgot-page">
    <div class="mobile-shell mobile-auth-app">
        <div class="mobile-auth-content mobile-page mobile-page-stack">
            <header class="mobile-auth-header">
                <a href="login.html" class="mobile-auth-back-link" aria-label="Tillbaka till inloggning">
                    <span class="mobile-auth-back-link__icon">
                        <i class="fas fa-arrow-left"></i>
                    </span>
                    <span class="mobile-auth-back-link__label">Tillbaka</span>
                </a>
                <a href="register.html" class="mobile-auth-header__link">Skapa konto</a>
            </header>

            <section class="mobile-auth-intro mobile-auth-intro--forgot">
                <div class="mobile-auth-intro__brand">
                    <div class="mobile-auth-intro__mark">
                        <img src="/static/image/app-logo.png" alt="Rimalis app logo" class="mobile-auth-intro__logo">
                    </div>
                    <div class="mobile-auth-intro__text">
                        <span class="mobile-auth-intro__eyebrow">Rimalis Group</span>
                        <h1>Glömt lösenord?</h1>
                        <p>Skriv din e-postadress så skickar vi en återställningslänk till ditt konto.</p>
                    </div>
                </div>
            </section>

            <section class="mobile-auth-form-card mobile-auth-login-card">
                <div class="mobile-auth-login-card__top">
                    <h2>Återställ åtkomst</h2>
                    <p>Vi skickar instruktioner till den e-postadress du anger.</p>
                </div>

                <form class="space-y-4" id="forgotForm">
                    <label class="mobile-auth-field">
                        <span>E-post</span>
                        <div class="mobile-auth-field__control">
                            <i class="fas fa-envelope"></i>
                            <input type="email" placeholder="E-post" class="input-field" id="forgotEmail" required>
                        </div>
                    </label>

                    <button type="submit" class="btn-primary mobile-auth-submit">
                        <i class="fas fa-paper-plane"></i>
                        <span>Skicka återställningslänk</span>
                    </button>

                    <p class="text-center text-sm mt-2">
                        <a href="login.html" class="mobile-auth-inline-link">Tillbaka till inloggning</a>
                    </p>
                </form>
            </section>
        </div>
    </div>

    
    <script src="/static/js/mobile/mobile.js"></script>
    <script src="/static/js/auth/auth.js"></script>
    <script src="/static/js/public/i18n.js"></script>
</body>

</html>
